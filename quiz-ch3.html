<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합사회 3-3단원 · 환경 문제 암기 확인 퀴즈</title>
<style>
  :root{
    --bg:#f6f7f3;
    --card:#ffffff;
    --ink:#1f2a24;
    --muted:#6b7a70;
    --line:#e3e8e0;
    --green:#2f7d5b;
    --green-dark:#205c42;
    --green-soft:#e7f1ea;
    --right:#2f7d5b;
    --right-soft:#e7f3ec;
    --wrong:#c0473b;
    --wrong-soft:#fbeceb;
    --amber:#9a6b15;
    --amber-soft:#fbf3e2;
    --tag-mc:#3a6ea5;
    --tag-sa:#7a5aa6;
    --tag-ox:#b07a2a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    line-height:1.65;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 18px 80px;}

  /* Header */
  header{padding:36px 0 18px;}
  .eyebrow{font-size:13px;letter-spacing:.04em;color:var(--green);font-weight:700;margin-bottom:6px;}
  h1{font-size:26px;line-height:1.3;margin:0 0 6px;font-weight:800;letter-spacing:-.01em;}
  .sub{color:var(--muted);font-size:14px;margin:0;}

  /* Sticky bar */
  .bar{
    position:sticky;top:0;z-index:20;background:rgba(246,247,243,.92);
    backdrop-filter:blur(6px);border-bottom:1px solid var(--line);
    padding:12px 0;margin-bottom:22px;
  }
  .bar-inner{max-width:760px;margin:0 auto;padding:0 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .score{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;}
  .score b{color:var(--green);}
  .progress{flex:1;min-width:120px;height:8px;background:var(--line);border-radius:99px;overflow:hidden;}
  .progress > i{display:block;height:100%;width:0;background:var(--green);transition:width .35s ease;}
  .btns{display:flex;gap:8px;flex-wrap:wrap;width:100%;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .ctrl{
    font-size:13px;font-weight:600;padding:8px 13px;border-radius:9px;
    background:#fff;border:1px solid var(--line);color:var(--ink);transition:.15s;
  }
  .ctrl:hover{border-color:var(--green);color:var(--green);}
  .ctrl.active{background:var(--green);color:#fff;border-color:var(--green);}

  /* Question card */
  .q{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:20px 20px 18px;margin-bottom:16px;scroll-margin-top:90px;
  }
  .q.hide{display:none;}
  .q-head{display:flex;align-items:center;gap:9px;margin-bottom:12px;flex-wrap:wrap;}
  .num{
    font-size:13px;font-weight:800;color:#fff;background:var(--green-dark);
    width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.02em;}
  .tag.mc{color:var(--tag-mc);background:#eaf1f8;}
  .tag.sa{color:var(--tag-sa);background:#f2ecf8;}
  .tag.ox{color:var(--tag-ox);background:#f8f0e2;}
  .q-text{font-size:16.5px;font-weight:600;margin:0 0 14px;letter-spacing:-.01em;}
  .q-text .blank{color:var(--green);font-weight:800;border-bottom:2px solid var(--green);padding:0 14px;}

  /* Options */
  .opts{display:flex;flex-direction:column;gap:8px;}
  .opt{
    display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border:1px solid var(--line);
    border-radius:10px;background:#fff;cursor:pointer;transition:.13s;font-size:15px;
  }
  .opt:hover{border-color:var(--green);background:var(--green-soft);}
  .opt.sel{border-color:var(--green);background:var(--green-soft);}
  .opt .mk{font-weight:800;color:var(--muted);flex-shrink:0;}
  .opt.sel .mk{color:var(--green);}
  .opt.correct{border-color:var(--right);background:var(--right-soft);}
  .opt.correct .mk{color:var(--right);}
  .opt.incorrect{border-color:var(--wrong);background:var(--wrong-soft);}
  .opt.incorrect .mk{color:var(--wrong);}

  /* OX */
  .ox{display:flex;gap:10px;}
  .ox button{
    flex:1;padding:14px;border:1px solid var(--line);border-radius:11px;background:#fff;
    font-size:18px;font-weight:800;color:var(--ink);transition:.13s;
  }
  .ox button:hover{border-color:var(--green);background:var(--green-soft);}
  .ox button.sel{border-color:var(--green);background:var(--green-soft);color:var(--green-dark);}
  .ox button.correct{border-color:var(--right);background:var(--right-soft);color:var(--right);}
  .ox button.incorrect{border-color:var(--wrong);background:var(--wrong-soft);color:var(--wrong);}

  /* Short answer */
  .sa-input{
    width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;
    font-size:16px;font-family:inherit;color:var(--ink);background:#fff;
  }
  .sa-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft);}
  .sa-input.correct{border-color:var(--right);background:var(--right-soft);}
  .sa-input.incorrect{border-color:var(--wrong);background:var(--wrong-soft);}

  /* Grade button + result */
  .grade{
    margin-top:14px;background:var(--green);color:#fff;font-weight:700;font-size:14px;
    padding:10px 20px;border-radius:9px;transition:.15s;
  }
  .grade:hover{background:var(--green-dark);}
  .grade:disabled{opacity:.45;cursor:default;}

  .result{margin-top:14px;display:none;}
  .result.show{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:none;}}
  .verdict{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;margin-bottom:10px;}
  .verdict.ok{color:var(--right);}
  .verdict.no{color:var(--wrong);}
  .verdict .ic{font-size:19px;}
  .ans-line{font-size:14.5px;margin:0 0 10px;}
  .ans-line .lab{font-weight:800;color:var(--green-dark);}
  .expl{
    background:#fafbf9;border:1px solid var(--line);border-left:3px solid var(--green);
    border-radius:8px;padding:12px 14px;font-size:14.5px;color:#36433b;margin-bottom:10px;
  }
  .memo{
    background:var(--amber-soft);border:1px solid #efe1c2;border-left:3px solid var(--amber);
    border-radius:8px;padding:12px 14px;font-size:14.5px;color:#6e500f;
  }
  .memo .lab{font-weight:800;display:block;margin-bottom:3px;color:var(--amber);}
  .expl .lab{font-weight:800;display:block;margin-bottom:3px;color:var(--green-dark);}

  /* Done / empty */
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
  footer{text-align:center;color:var(--muted);font-size:12.5px;margin-top:30px;}
  @media(max-width:520px){
    h1{font-size:22px;} .q-text{font-size:15.5px;}
    .ctrl{flex:1;text-align:center;}
  }
</style>
</head>
<body>
<div class="bar">
  <div class="bar-inner">
    <span class="score">맞힘 <b id="sCorrect">0</b> / 채점 <span id="sGraded">0</span> · 전체 <span id="sTotal">0</span></span>
    <div class="progress"><i id="prog"></i></div>
    <div class="btns">
      <button class="ctrl" id="btnShuffle">🔀 순서 섞기</button>
      <button class="ctrl" id="btnWrong">✏️ 오답만 다시 풀기</button>
      <button class="ctrl" id="btnReveal">👁 정답·해설 보기</button>
      <button class="ctrl" id="btnReset">↺ 처음부터</button>
    </div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="eyebrow">통합사회 · Ⅲ. 자연환경과 인간</div>
    <h1>3-3단원 · 환경 문제 해결을 위한 다양한 노력</h1>
    <p class="sub">답을 고르거나 입력한 뒤 <b>채점</b>을 누르면 정답 여부와 해설·암기 포인트가 나와요. 객관식 16 · 단답형 15 · O/X 15</p>
  </header>
  <div id="quiz"></div>
  <div id="empty" class="empty" style="display:none;"></div>
  <footer>정지윤 내신 대비 · 교과서 본문 기반 자동 채점 퀴즈</footer>
</div>

  {type:'ox', q:"환경 문제는 한 번 발생해도 짧은 시간과 적은 비용으로 쉽게 복구할 수 있다.", answer:'X',

   memo:"미세 먼지 = 10㎛보다 '작은' 것"},

   memo:"황사 방향 = 중국 → 우리나라 (반대 아님)"},

  {type:'ox', q:"지구 온난화로 극지방·고산 지대의 빙하가 녹아 해수면이 상승한다.", answer:'O',
   expl:"맞아요. 빙하가 녹으면 해수면이 상승해 해안 저지대·섬 지역이 침수됩니다.",
   memo:"온난화 → 빙하↓ → 해수면↑ → 침수 피해"},

  {type:'ox', q:"지구 온난화로 기온이 오르면 중위도 지역의 겨울은 항상 따뜻해진다.", answer:'X',
   expl:"틀려요. 극 소용돌이가 남하하면서 오히려 한파·폭설이 늘 수 있어요. 이것이 ‘지구 온난화의 역설’입니다.",
   memo:"지구 온난화의 역설 = 중위도 겨울이 오히려 한파·폭설↑"},

  {type:'ox', q:"산성비는 건축물과 조각상을 부식시키고 토양 오염도 일으킨다.", answer:'O',
   expl:"맞아요. 산성비는 삼림 파괴뿐 아니라 건축물·조각상 부식, 토양 오염을 일으킵니다.",
   memo:"산성비 피해 = 삼림 + 건축물·조각상 부식 + 토양 오염"},

  {type:'ox', q:"오존층이 파괴되면 지상에 도달하는 자외선이 감소한다.", answer:'X',
   expl:"틀려요. 오존층은 자외선을 흡수하므로, 파괴되면 자외선이 ‘증가’해 피부암·안과 질환이 늘어납니다.",
   memo:"오존층 파괴 → 자외선 '증가' → 피부암·안과 질환"},

  {type:'ox', q:"사막화가 진행되면 물 부족·식량 부족 문제가 생기고 황사도 심해진다.", answer:'O',
   expl:"맞아요. 아랄해 사례처럼 사막화는 물·식량 부족과 황사 악화를 불러옵니다.",
   memo:"사막화 결과 = 물 부족 + 식량 부족 + 황사 심화"},

  {type:'ox', q:"열대림이 파괴되면 이산화 탄소 배출이 줄어 지구 온난화가 완화된다.", answer:'X',
   expl:"틀려요. 열대림이 파괴되면 이산화 탄소 배출은 늘고 산소 공급은 줄어 지구 온난화가 ‘심화’됩니다.",
   memo:"열대림 파괴 → CO₂↑·산소↓ → 온난화 '심화'"},

  {type:'ox', q:"환경 오염 방지 시설 설치와 노후 시설 정비는 ‘기업’의 노력에 해당한다.", answer:'O',
   expl:"맞아요. 시설 설치·정비는 기업이 실천하는 대표적인 노력이에요.",
   memo:"기업 = 오염 방지 시설 설치 + 노후 시설 정비"},

  {type:'ox', q:"환경 영향 평가 실시와 저탄소 녹색 성장 추진은 ‘개인’의 노력에 해당한다.", answer:'X',
   expl:"틀려요. 환경 영향 평가와 저탄소 녹색 성장은 ‘정부’의 노력입니다.",
   memo:"정부 = 환경 영향 평가 + 저탄소 녹색 성장 (개인 아님)"},

  {type:'ox', q:"시민 단체는 시민운동과 환경 보호 캠페인 등으로 환경 문제 해결에 참여한다.", answer:'O',
   expl:"맞아요. 시민 단체는 시민운동·캠페인으로 환경 문제 해결에 힘씁니다.",
   memo:"시민 단체 = 시민운동 + 환경 보호 캠페인"},

  {type:'ox', q:"미세 먼지와 황사는 반도체 등 정밀 제품의 불량률을 높여 첨단 산업에 악영향을 준다.", answer:'O',
   expl:"맞아요. 건강뿐 아니라 첨단 산업(불량률↑)과 항공 산업(가시거리↓)에도 피해를 줍니다.",
   memo:"미세 먼지·황사 = 건강 + 첨단 산업(불량률↑) + 항공 산업(가시거리↓)"}
];

/* ===== 상태 ===== */
let order = DATA.map((_,i)=>i);
const state = {}; // idx -> {picked, graded, correct}
const MARKS = ['①','②','③','④','⑤'];

function norm(s){
  return (s||'').toString().trim().toLowerCase()
    .replace(/\s+/g,'').replace(/[().,·]/g,'');
}

function render(list){
  const root = document.getElementById('quiz');
  const empty = document.getElementById('empty');
  root.innerHTML='';
  if(list.length===0){
    empty.style.display='block';
    empty.textContent='표시할 문제가 없어요. 위의 “처음부터”를 눌러 다시 시작해 보세요.';
    updateScore();
    return;
  }
  empty.style.display='none';
  list.forEach((idx,pos)=>{
    root.appendChild(buildCard(idx,pos+1));
  });
  updateScore();
}

function buildCard(idx, displayNo){
  const item = DATA[idx];
  const st = state[idx] || (state[idx]={picked:null,graded:false,correct:false});
  const card = document.createElement('div');
  card.className='q'; card.dataset.idx=idx;
  card.id='q'+idx;

  const tagMap={mc:['mc','객관식'],sa:['sa','단답형'],ox:['ox','O / X']};
  const [tagCls,tagTxt]=tagMap[item.type];

  let qhtml = item.q.replace(/\[\s*\]/g,'<span class="blank">　　</span>');

  let body='';
  if(item.type==='mc'){
    body='<div class="opts">'+item.options.map((o,i)=>
      `<div class="opt" data-i="${i}"><span class="mk">${MARKS[i]}</span><span>${o}</span></div>`).join('')+'</div>';
  }else if(item.type==='ox'){
    body='<div class="ox"><button data-v="O">O</button><button data-v="X">X</button></div>';
  }else{
    body='<input class="sa-input" type="text" placeholder="정답을 입력하세요" autocomplete="off">';
  }

  card.innerHTML=`
    <div class="q-head">
      <span class="num">${displayNo}</span>
      <span class="tag ${tagCls}">${tagTxt}</span>
    </div>
    <p class="q-text">${qhtml}</p>
    ${body}
    <button class="grade">채점하기</button>
    <div class="result"></div>`;

  // interactions
  if(item.type==='mc'){
    card.querySelectorAll('.opt').forEach(el=>{
      el.addEventListener('click',()=>{
        if(st.graded) return;
        card.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
        el.classList.add('sel'); st.picked=+el.dataset.i;
      });
    });
  }else if(item.type==='ox'){
    card.querySelectorAll('.ox button').forEach(el=>{
      el.addEventListener('click',()=>{
        if(st.graded) return;
        card.querySelectorAll('.ox button').forEach(b=>b.classList.remove('sel'));
        el.classList.add('sel'); st.picked=el.dataset.v;
      });
    });
  }else{
    const inp=card.querySelector('.sa-input');
    inp.addEventListener('input',()=>{ st.picked=inp.value; });
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); card.querySelector('.grade').click(); }});
  }

  card.querySelector('.grade').addEventListener('click',()=>gradeOne(idx,card));

  if(st.graded) applyGraded(idx,card,true);
  return card;
}

function gradeOne(idx,card){
  const item=DATA[idx];
  const st=state[idx];
  if(st.picked===null || st.picked===undefined || (item.type==='sa' && !norm(st.picked))){
    const inp=card.querySelector('.sa-input');
    if(item.type==='sa'&&inp){ inp.focus(); inp.placeholder='먼저 답을 입력하세요'; }
    card.querySelector('.grade').animate(
      [{transform:'translateX(0)'},{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],
      {duration:220});
    return;
  }
  let correct=false;
  if(item.type==='mc') correct = (+st.picked===item.answer);
  else if(item.type==='ox') correct = (st.picked===item.answer);
  else correct = item.answers.some(a=>norm(a)===norm(st.picked));
  st.graded=true; st.correct=correct;
  applyGraded(idx,card,false);
  updateScore();
}

function applyGraded(idx,card,silent){
  const item=DATA[idx]; const st=state[idx];

  if(item.type==='mc'){
    card.querySelectorAll('.opt').forEach(el=>{
      el.style.cursor='default';
      const i=+el.dataset.i;
      if(i===item.answer) el.classList.add('correct');
      if(i===+st.picked && !st.correct) el.classList.add('incorrect');
    });
  }else if(item.type==='ox'){
    card.querySelectorAll('.ox button').forEach(el=>{
      el.style.cursor='default';
      if(el.dataset.v===item.answer) el.classList.add('correct');
      if(el.dataset.v===st.picked && !st.correct) el.classList.add('incorrect');
    });
  }else{
    const inp=card.querySelector('.sa-input');
    if(inp){ inp.readOnly=true; inp.classList.add(st.correct?'correct':'incorrect');
      if(st.picked!==undefined) inp.value=st.picked; }
  }
  const g=card.querySelector('.grade'); g.disabled=true; g.textContent='채점 완료';

  const ansShown = item.type==='mc' ? MARKS[item.answer]+' '+item.options[item.answer]
                 : item.type==='ox' ? item.answer
                 : item.shown;
  const res=card.querySelector('.result');
  res.innerHTML=`
    <div class="verdict ${st.correct?'ok':'no'}">
      <span class="ic">${st.correct?'⭕':'❌'}</span>${st.correct?'정답이에요!':'오답이에요'}
    </div>
    <p class="ans-line"><span class="lab">정답</span> · ${ansShown}</p>
    <div class="expl"><span class="lab">해설</span>${item.expl}</div>
    <div class="memo"><span class="lab">📌 암기 포인트</span>${item.memo}</div>`;
  res.classList.add('show');
}

function updateScore(){
  const graded=Object.values(state).filter(s=>s.graded).length;
  const correct=Object.values(state).filter(s=>s.graded&&s.correct).length;
  document.getElementById('sCorrect').textContent=correct;
  document.getElementById('sGraded').textContent=graded;
  document.getElementById('sTotal').textContent=DATA.length;
  document.getElementById('prog').style.width=(graded/DATA.length*100)+'%';
}

/* ===== 컨트롤 ===== */
document.getElementById('btnShuffle').addEventListener('click',function(){
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  this.classList.add('active'); setTimeout(()=>this.classList.remove('active'),400);
  render(order); window.scrollTo({top:0,behavior:'smooth'});
});

document.getElementById('btnWrong').addEventListener('click',function(){
  const wrong=order.filter(i=>state[i]&&state[i].graded&&!state[i].correct);
  if(wrong.length===0){
    const empty=document.getElementById('empty');
    document.getElementById('quiz').innerHTML='';
    empty.style.display='block';
    empty.textContent='틀린 문제가 없어요! 👏 채점한 문제를 모두 맞혔거나, 아직 틀린 문제가 없습니다.';
    return;
  }
  wrong.forEach(i=>{ state[i]={picked:null,graded:false,correct:false}; }); // 다시 풀도록 초기화
  render(wrong); window.scrollTo({top:0,behavior:'smooth'});
});

document.getElementById('btnReveal').addEventListener('click',function(){
  const reveal=!this.classList.contains('active');
  this.classList.toggle('active',reveal);
  document.querySelectorAll('.q').forEach(card=>{
    const idx=+card.dataset.idx; const item=DATA[idx];
    if(reveal){
      if(!state[idx]) state[idx]={picked:null,graded:false,correct:false};
      // 정답을 자동 선택해 보여주기 (채점 상태로 전환)
      if(item.type==='mc') state[idx].picked=item.answer;
      else if(item.type==='ox') state[idx].picked=item.answer;
      else state[idx].picked=item.shown;
      state[idx].graded=true; state[idx].correct=true;
      // 다시 그려서 정답 표시
      const fresh=buildCard(idx, card.querySelector('.num').textContent);
      card.replaceWith(fresh);
    }
  });
  if(reveal){ this.textContent='👁 정답 가리기'; }
  else { this.textContent='👁 정답·해설 보기'; render(order); }
  updateScore();
});

document.getElementById('btnReset').addEventListener('click',function(){
  if(!confirm('모든 답과 채점 기록을 지우고 처음부터 다시 풀까요?')) return;
  for(const k in state) delete state[k];
  order=DATA.map((_,i)=>i);
  document.getElementById('btnReveal').classList.remove('active');
  document.getElementById('btnReveal').textContent='👁 정답·해설 보기';
  render(order); window.scrollTo({top:0,behavior:'smooth'});
});

render(order);
</script>
